  <script>
    (function() {
      // ==================== CONFIGURAÇÃO SUPABASE ====================
      const SUPABASE_URL = 'https://fjkeiutbmeynsoryxhxe.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZqa2VpdXRibWV5bnNvcnl4aHhlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMjI0MjgsImV4cCI6MjA4OTU5ODQyOH0.4BezPn_tqPdgdL9jQyrNK0Y8Ii9MP0m8Jteq7O63MDI';
      const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      
      let subscription = null;
      
      // PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('service-worker.js').catch(error => console.log('ServiceWorker falhou:', error));
        });
      }

      let deferredPrompt;
      const installButton = document.getElementById('installButton');
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installButton.style.display = 'block';
      });
      installButton.addEventListener('click', async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        await deferredPrompt.userChoice;
        deferredPrompt = null;
        installButton.style.display = 'none';
      });

      // Banco de dados local
      let RIFAS = [];

      function salvarDadosLocal() {
        localStorage.setItem('rifas_onlines', JSON.stringify(RIFAS));
        renderizarRifas();
      }

      // Funções Supabase
      async function carregarRifasDoSupabase() {
        try {
          const { data: rifasData, error: rifasError } = await supabaseClient
            .from('rifas')
            .select('*')
            .order('id', { ascending: true });
          
          if (rifasError) throw rifasError;
          
          const rifasCompletas = [];
          for (const rifa of rifasData) {
            const { data: bolasData, error: bolasError } = await supabaseClient
              .from('bolas')
              .select('*')
              .eq('rifa_id', rifa.id)
              .order('numero', { ascending: true });
            
            if (bolasError) throw bolasError;
            
            rifasCompletas.push({
              id: rifa.id,
              nomeProduto: rifa.nome_produto,
              sobreProduto: rifa.sobre_produto,
              imagemData: rifa.imagem_data,
              valorPonto: rifa.valor_ponto,
              senha: rifa.senha,
              senhaPessoal: rifa.senha_pessoal,
              telefoneCriador: rifa.telefone_criador,
              chavePix: rifa.chave_pix,
              dataSorteio: rifa.data_sorteio,
              criadorEmail: rifa.criador_email,
              bolas: bolasData.map(bola => ({
                numero: bola.numero,
                status: bola.status,
                clienteNome: bola.cliente_nome,
                clienteTel: bola.cliente_tel
              }))
            });
          }
          
          RIFAS = rifasCompletas;
          salvarDadosLocal();
          iniciarEscutaRealtime();
          
        } catch (error) {
          console.error('Erro ao carregar rifas:', error);
          const saved = localStorage.getItem('rifas_onlines');
          if (saved) {
            const parsed = JSON.parse(saved);
            if (Array.isArray(parsed)) RIFAS = parsed;
            renderizarRifas();
          }
          alertaModerno('Erro', '❌', 'Erro ao conectar com o servidor. Usando dados locais.');
        }
      }
      
      async function salvarRifaNoSupabase(rifa) {
        const { data: rifaData, error: rifaError } = await supabaseClient
          .from('rifas')
          .insert({
            nome_produto: rifa.nomeProduto,
            sobre_produto: rifa.sobreProduto,
            imagem_data: rifa.imagemData,
            valor_ponto: rifa.valorPonto,
            senha: rifa.senha,
            senha_pessoal: rifa.senhaPessoal,
            telefone_criador: rifa.telefoneCriador,
            chave_pix: rifa.chavePix,
            data_sorteio: rifa.dataSorteio,
            criador_email: rifa.criadorEmail
          })
          .select()
          .single();
        
        if (rifaError) throw rifaError;
        
        const bolasParaInserir = rifa.bolas.map(bola => ({
          rifa_id: rifaData.id,
          numero: bola.numero,
          status: bola.status,
          cliente_nome: bola.clienteNome,
          cliente_tel: bola.clienteTel
        }));
        
        const { error: bolasError } = await supabaseClient
          .from('bolas')
          .insert(bolasParaInserir);
        
        if (bolasError) throw bolasError;
        
        return rifaData.id;
      }
      
      async function atualizarBolaNoSupabase(rifaId, numeroBola, dadosBola) {
        const { error } = await supabaseClient
          .from('bolas')
          .update({
            status: dadosBola.status,
            cliente_nome: dadosBola.clienteNome,
            cliente_tel: dadosBola.clienteTel,
            updated_at: new Date()
          })
          .eq('rifa_id', rifaId)
          .eq('numero', numeroBola);
        
        if (error) throw error;
      }
      
      async function removerRifaDoSupabase(rifaId) {
        const { error } = await supabaseClient
          .from('rifas')
          .delete()
          .eq('id', rifaId);
        
        if (error) throw error;
      }
      
      function iniciarEscutaRealtime() {
        if (subscription) subscription.unsubscribe();
        
        subscription = supabaseClient
          .channel('rifas-channel')
          .on('postgres_changes', { event: '*', schema: 'public', table: 'rifas' }, () => carregarRifasDoSupabase())
          .on('postgres_changes', { event: '*', schema: 'public', table: 'bolas' }, () => carregarRifasDoSupabase())
          .subscribe();
      }

      // Funções auxiliares
      function encontrarProximoIdDisponivel() {
        if (RIFAS.length === 0) return 1;
        const idsExistentes = RIFAS.map(r => r.id).sort((a, b) => a - b);
        let idEsperado = 1;
        for (let id of idsExistentes) {
          if (id > idEsperado) return idEsperado;
          idEsperado = id + 1;
        }
        return idEsperado;
      }

      function formatarId(id) {
        return id.toString().padStart(2, '0');
      }

      function formatarDataBR(dataISO) {
        if (!dataISO) return 'não definida';
        const [ano, mes, dia] = dataISO.split('-');
        return `${dia}/${mes}/${ano}`;
      }

      function formatarValor(valor) {
        if (!valor) return 'Valor não definido';
        return `R$ ${parseFloat(valor).toFixed(2)}`;
      }

      function escapeHTML(str) {
        if (!str) return '';
        return String(str).replace(/[&<>"]/g, function(m) {
          if (m === '&') return '&amp;';
          if (m === '<') return '&lt;';
          if (m === '>') return '&gt;';
          if (m === '"') return '&quot;';
          return m;
        });
      }

      function gerarNumeros(qtd) {
        const nums = [];
        for (let i = 0; i < qtd; i++) nums.push(i.toString().padStart(2, '0'));
        return nums;
      }

      function alertaModerno(titulo, icone, mensagem) {
        return new Promise((resolve) => {
          const overlay = document.createElement('div');
          overlay.className = 'modal-overlay';
          overlay.innerHTML = `
            <div class="alerta-moderno">
              <div class="alerta-icon">${icone}</div>
              <h3>${titulo}</h3>
              <p>${mensagem}</p>
              <button id="btnOkAlerta">OK</button>
            </div>
          `;
          document.body.appendChild(overlay);
          overlay.querySelector('#btnOkAlerta').addEventListener('click', () => {
            document.body.removeChild(overlay);
            resolve();
          });
        });
      }

      function promptModerno(titulo, placeholder, isPassword = false) {
        return new Promise((resolve) => {
          const overlay = document.createElement('div');
          overlay.className = 'modal-overlay';
          overlay.innerHTML = `
            <div class="swal-modal-moderno">
              <h3 style="color:orange; margin-bottom:20px;">${titulo}</h3>
              <input type="${isPassword ? 'password' : 'text'}" id="promptInput" class="swal-input-moderno" placeholder="${placeholder}" autofocus>
              <div style="display:flex; gap:15px; justify-content:center; margin-top:25px;">
                <button class="swal-button" id="confirmBtn">Confirmar</button>
                <button class="swal-button btn-sec" id="cancelBtn">Cancelar</button>
              </div>
            </div>
          `;
          document.body.appendChild(overlay);
          const input = overlay.querySelector('#promptInput');
          overlay.querySelector('#confirmBtn').addEventListener('click', () => {
            document.body.removeChild(overlay);
            resolve(input.value);
          });
          overlay.querySelector('#cancelBtn').addEventListener('click', () => {
            document.body.removeChild(overlay);
            resolve(null);
          });
          input.addEventListener('keyup', (e) => {
            if (e.key === 'Enter') {
              document.body.removeChild(overlay);
              resolve(input.value);
            }
          });
        });
      }

      // Funções de negócio
      async function excluirCliente(rifaId, numeroBola) {
        const rifa = RIFAS.find(r => r.id === rifaId);
        if (!rifa) return false;
        const bola = rifa.bolas.find(b => b.numero === numeroBola);
        if (!bola) return false;
        if (bola.status !== 'comprada') {
          alertaModerno('Aviso', '❌', 'Apenas bolas compradas podem ser liberadas.');
          return false;
        }
        
        await atualizarBolaNoSupabase(rifaId, numeroBola, {
          status: 'disponivel',
          clienteNome: null,
          clienteTel: null
        });
        bola.status = 'disponivel';
        bola.clienteNome = null;
        bola.clienteTel = null;
        salvarDadosLocal();
        return true;
      }

        if (novoSobre !== null && novoSobre !== '') rifa.sobreProduto = novoSobre;
        
        const novoValor = await promptModerno('Editar valor do ponto (R$)', 'Ex: 10.00');
        if (novoValor !== null && novoValor !== '') rifa.valorPonto = novoValor;
        
        const novaChavePix = await promptModerno('Editar chave PIX', 'Digite a chave PIX');
        if (novaChavePix !== null && novaChavePix !== '') rifa.chavePix = novaChavePix;
        
        const novoTelefone = await promptModerno('Editar telefone do criador', 'Ex: 11999999999');
        if (novoTelefone !== null && novoTelefone !== '') rifa.telefoneCriador = novoTelefone;
        
        const novaData = await promptModerno('Editar data do sorteio (AAAA-MM-DD)', 'Ex: 2025-12-31');
        if (novaData !== null && novaData !== '') rifa.dataSorteio = novaData;
        
        const { error } = await supabaseClient
          .from('rifas')
          .update({
            nome_produto: rifa.nomeProduto,
            sobre_produto: rifa.sobreProduto,
            valor_ponto: rifa.valorPonto,
            chave_pix: rifa.chavePix,
            telefone_criador: rifa.telefoneCriador,
            data_sorteio: rifa.dataSorteio
          })

          container.innerHTML = '<p style="color:#ccc; margin:50px;">Nenhuma rifa criada ainda. Clique em "Criar Rifa" para começar.</p>';
          return;
        }

        RIFAS.forEach(rifa => {

          idDiv.className = 'card-id';
          idDiv.textContent = `ID: ${formatarId(rifa.id)}`;
          card.appendChild(idDiv);

          const imgDiv = document.createElement('div');
          imgDiv.className = 'produto-imagem';
          if (rifa.imagemData) {
            const img = document.createElement('img');
            img.src = rifa.imagemData;
            img.alt = 'produto';
            imgDiv.appendChild(img);
            imgDiv.onclick = () => ampliarImagem(rifa.imagemData);
          } else {
            imgDiv.classList.add('sem-imagem');
            imgDiv.textContent = '📷';
          }

          content.className = 'card-content';

          content.innerHTML = `
            <div class="produto-nome">${escapeHTML(rifa.nomeProduto)}</div>
            <div class="produto-sobre">${escapeHTML(rifa.sobreProduto) || '—'}</div>
            <div class="valor-ponto"><span>💰</span> Valor: <span>${valorFormatado}</span></div>
            <div class="info-sorteio"><span>📅 ${dataFormatada}</span><span>🔢 ${rifa.bolas.length} bolas</span></div>
          `;

            const pixDiv = document.createElement('div');
            pixDiv.className = 'pix-info';

            content.appendChild(pixDiv);
          }

          bolasWrap.className = 'bolas-grid';
          rifa.bolas.forEach((bola, idx) => {
            const bolaEl = document.createElement('div');

            bolaEl.textContent = bola.numero;

            bolaEl.appendChild(nomeSpan);
            bolaEl.onclick = () => {
              if (bola.status === 'disponivel') comprarBola(rifa.id, idx);
              else alertaModerno('Bola ocupada', '⚠️', `Bola ${bola.numero} já está ${bola.status === 'comprada' ? 'comprada' : 'ganhadora'}.`);

      async function comprarBola(rifaId, indexBola) {
        const rifa = RIFAS.find(r => r.id === rifaId);
        if (!rifa) return;
        const bola = rifa.bolas[indexBola];
        if (bola.status !== 'disponivel') return;

        const nome = await promptModerno('Digite seu nome completo', 'Ex: João Silva');
        if (!nome) return;
        const telefone = await promptModerno('Telefone com DDD', '(11) 99999-9999');
        if (!telefone) return;

        await atualizarBolaNoSupabase(rifaId, bola.numero, {
          status: 'comprada',
          clienteNome: nome,
          clienteTel: telefone
        });
        bola.status = 'comprada';
        bola.clienteNome = nome;
        bola.clienteTel = telefone;
        salvarDadosLocal();
        alertaModerno('Bola reservada', '✅', `Bola ${bola.numero} reservada!`);
      }

        const rifa = RIFAS.find(r => r.id === rifaId);
        if (!rifa) return;
        const senha = await promptModerno('DIGITE A SENHA DE PROTEÇÃO', 'senha', true);
        if (senha !== rifa.senha) {

        await removerRifaDoSupabase(rifaId);
        await carregarRifasDoSupabase();
        alertaModerno('Rifa finalizada', '🗑️', 'Rifa removida com sucesso!');
      }

            imagemData: imagemBase64,
            bolas: bolas,
            valorPonto: valorPonto,
            senha: senha,
            senhaPessoal: senhaPessoal,
            telefoneCriador: telefoneCriador,
            chavePix: chavePix,
            dataSorteio: dataSorteio,
            criadorEmail: email
          };

          const novoId = await salvarRifaNoSupabase(novaRifa);
          if (novoId) {
            novaRifa.id = novoId;
            RIFAS.push(novaRifa);
            salvarDadosLocal();
            document.body.removeChild(overlay);
            alertaModerno('Rifa criada!', '🎉', 'Sua rifa foi criada com sucesso!');
            await carregarRifasDoSupabase();
          }
        };

        modal.querySelector('#cancelarBtn').onclick = () => document.body.removeChild(overlay);
      };

      // Minhas Rifas
      document.getElementById('linkMinhasRifas').addEventListener('click', async () => {
        const idRifa = await promptModerno('ID da rifa (está no card)', 'ex: 01');
        if (!idRifa) return;
        const idNumerico = parseInt(idRifa, 10);
        const rifa = RIFAS.find(r => r.id === idNumerico);
        if (!rifa) { alertaModerno('Erro', '❌', 'Rifa não encontrada!'); return; }

        const senhaPessoal = await promptModerno('Digite sua senha pessoal', 'senha', true);
        if (senhaPessoal !== rifa.senhaPessoal) { alertaModerno('Erro', '❌', 'Senha incorreta!'); return; }

        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        const modal = document.createElement('div');
        modal.className = 'modal-card';
        modal.style.maxWidth = '800px';
        modal.innerHTML = `<div class="crown-icon" onclick="acessarAdmin()">👑</div><h2>📋 Dados da Rifa</h2><div id="conteudoMinhasRifas"></div><button class="btn-sec" id="fecharMinhasRifas">Fechar</button>`;
        overlay.appendChild(modal);
        document.body.appendChild(overlay);

        const conteudo = modal.querySelector('#conteudoMinhasRifas');
        
        const divRifa = document.createElement('div');
        divRifa.style.background = '#1b4d2b';
        divRifa.style.borderRadius = '20px';
        divRifa.style.padding = '15px';
        divRifa.style.marginBottom = '20px';
        divRifa.innerHTML = `<h3>${escapeHTML(rifa.nomeProduto)} (ID: ${formatarId(rifa.id)}) <button class="btn-editar" onclick="editarRifa(${JSON.stringify(rifa).replace(/"/g, '&quot;')})">✏️ Editar</button></h3>`;

        const compradas = rifa.bolas.filter(b => b.status !== 'disponivel');
        if (compradas.length === 0) {
          divRifa.innerHTML += '<p>Nenhuma bola comprada ainda.</p>';
        } else {
          const wrapper = document.createElement('div');
          wrapper.className = 'tabela-wrapper';
          const tabela = document.createElement('table');
          tabela.className = 'tabela-clientes';
          tabela.innerHTML = '<tr><th>Nº</th><th>Cliente</th><th>Telefone</th><th>Status</th><th>Ação</th>59';
          compradas.forEach(b => {
            const row = tabela.insertRow();
            row.insertCell().textContent = b.numero;
            row.insertCell().textContent = b.clienteNome || '-';
            const cellTel = row.insertCell();
            if (b.status === 'ganhadora' && b.clienteTel) {
              const telSpan = document.createElement('span');
              telSpan.className = 'telefone-vencedor';
              telSpan.textContent = b.clienteTel;
              telSpan.onclick = () => abrirWhatsappVencedor(b.clienteTel);
              cellTel.appendChild(telSpan);
            } else {
              cellTel.textContent = b.clienteTel || '-';
            }
            row.insertCell().textContent = b.status === 'ganhadora' ? '🏆 Vencedor' : 'Comprada';
            const cellAcao = row.insertCell();
            if (b.status === 'comprada') {
              const btnExcluir = document.createElement('button');
              btnExcluir.className = 'btn-excluir-cliente';
              btnExcluir.textContent = '❌ Liberar';
              btnExcluir.onclick = async () => {
                if (confirm(`Liberar bola ${b.numero}?`)) {
                  await excluirCliente(rifa.id, b.numero);
                  document.body.removeChild(overlay);
                  renderizarRifas();
                }
              };
              cellAcao.appendChild(btnExcluir);
            } else {
              cellAcao.textContent = '-';
            }
          });
          wrapper.appendChild(tabela);
          divRifa.appendChild(wrapper);
        }

        const divVenc = document.createElement('div');
        divVenc.className = 'vencedor-linha';
        divVenc.innerHTML = `<label>Definir vencedor:</label><div><input type="text" id="numVenc_${rifa.id}" placeholder="00" maxlength="2"><button id="btnVenc_${rifa.id}">Salvar</button></div>`;
        divRifa.appendChild(divVenc);
        conteudo.appendChild(divRifa);

        document.getElementById(`btnVenc_${rifa.id}`).onclick = async () => {
          const num = document.getElementById(`numVenc_${rifa.id}`).value.trim().padStart(2,'0');
          const bola = rifa.bolas.find(b => b.numero === num);
          if (!bola) { alertaModerno('Erro', '❌', 'Número não existe'); return; }
          if (bola.status === 'disponivel') { alertaModerno('Aviso', '⚠️', 'Bola não comprada!'); return; }
          
          await atualizarBolaNoSupabase(rifa.id, num, {
            status: 'ganhadora',
            clienteNome: bola.clienteNome,
            clienteTel: bola.clienteTel
          });
          rifa.bolas.forEach(b => { if (b.status === 'ganhadora') b.status = 'comprada'; });
          bola.status = 'ganhadora';
          salvarDadosLocal();
          document.body.removeChild(overlay);
          renderizarRifas();
          alertaModerno('Vencedor', '🏆', `Bola ${num} é a vencedora!`);
        };

        modal.querySelector('#fecharMinhasRifas').onclick = () => document.body.removeChild(overlay);
      });

      // Expor funções globais
      window.editarRifa = editarRifa;
      window.acessarAdmin = acessarAdmin;

      // Termo de uso
      function mostrarTermoUso() {
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        overlay.innerHTML = `
          <div class="modal-card">
            <h2>📋 Termo de Uso</h2>
            <p>Esta aplicação é livre e fica sob responsabilidade do usuário.</p>
            <div style="background:#0d391f; padding:15px; border-radius:20px; margin:15px 0;">
              <p>⚠️ Ao criar uma rifa, use chave PIX aleatória (email).</p>
              <p>🎲 Sorteios baseados na Lotece (19:30).</p>
              <p>📱 Cadastre corretamente seus dados.</p>
            </div>
            <button id="aceitarTermo" class="btn-termo">Aceito</button>
          </div>
        `;
        document.body.appendChild(overlay);
        overlay.querySelector('#aceitarTermo').onclick = () => {
          document.body.removeChild(overlay);
          localStorage.setItem('termo_aceito', 'true');
        };
      }

      if (!localStorage.getItem('termo_aceito')) setTimeout(mostrarTermoUso, 500);
      
      // Iniciar
      carregarRifasDoSupabase();
    })();
  </script>
</body>
</html>
