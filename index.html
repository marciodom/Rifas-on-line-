  <script>
    (function() {
      // ==================== CONFIGURAÇÃO SUPABASE ====================
      const SUPABASE_URL = 'https://fjkeiutbmeynsoryxhxe.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZqa2VpdXRibWV5bnNvcnl4aHhlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMjI0MjgsImV4cCI6MjA4OTU5ODQyOH0.4BezPn_tqPdgdL9jQyrNK0Y8Ii9MP0m8Jteq7O63MDI';
      const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      
      let subscription = null;
      let RIFAS = [];

      // ---------- FUNÇÕES AUXILIARES (mantidas) ----------
      function salvarDadosLocal() {
        try {
          localStorage.setItem('rifas_onlines', JSON.stringify(RIFAS));
        } catch (e) {
          if (e.name === 'QuotaExceededError') {
            localStorage.clear();
            try {
              localStorage.setItem('rifas_onlines', JSON.stringify(RIFAS));
            } catch(e2) {}
          }
        }
        renderizarRifas();
      }

      async function carregarRifasDoSupabase() {
        try {
          const { data: rifasData, error: rifasError } = await supabaseClient
            .from('rifas')
            .select('*')
            .order('id', { ascending: true });
          
          if (rifasError) throw rifasError;
          
          const rifasCompletas = [];
          for (const rifa of rifasData) {
            const { data: bolasData, error: bolasError } = await supabaseClient
              .from('bolas')
              .select('*')
              .eq('rifa_id', rifa.id)
              .order('numero', { ascending: true });
            
            if (bolasError) throw bolasError;
            
            rifasCompletas.push({
              id: rifa.id,
              nomeProduto: rifa.nome_produto,
              sobreProduto: rifa.sobre_produto,
              imagemData: rifa.imagem_data,
              valorPonto: rifa.valor_ponto,
              senha: rifa.senha,
              senhaPessoal: rifa.senha_pessoal,
              telefoneCriador: rifa.telefone_criador,
              chavePix: rifa.chave_pix,
              dataSorteio: rifa.data_sorteio,
              criadorEmail: rifa.criador_email,
              bolas: bolasData.map(bola => ({
                numero: bola.numero,
                status: bola.status,
                clienteNome: bola.cliente_nome,
                clienteTel: bola.cliente_tel
              }))
            });
          }
          
          RIFAS = rifasCompletas;
          salvarDadosLocal();
          iniciarEscutaRealtime();
        } catch (error) {
          console.error('Erro ao carregar rifas do Supabase:', error);
          const saved = localStorage.getItem('rifas_onlines');
          if (saved) {
            try {
              const parsed = JSON.parse(saved);
              if (Array.isArray(parsed)) {
                RIFAS = parsed;
                renderizarRifas();
              }
            } catch(e) {}
          }
          alertaModerno('Erro', '❌', 'Erro ao conectar com o servidor. Usando dados locais.');
        }
      }

      async function salvarRifaNoSupabase(rifa) {
        const { data: rifaData, error: rifaError } = await supabaseClient
          .from('rifas')
          .insert({
            nome_produto: rifa.nomeProduto,
            sobre_produto: rifa.sobreProduto,
            imagem_data: rifa.imagemData,
            valor_ponto: rifa.valorPonto,
            senha: rifa.senha,
            senha_pessoal: rifa.senhaPessoal,

          })

        if (rifaError) throw rifaError;

          rifa_id: rifaData.id,

          status: bola.status,

      function iniciarEscutaRealtime() {
        if (subscription) subscription.unsubscribe();
        
        subscription = supabaseClient
          .channel('rifas-channel')
          // Escutar mudanças na tabela rifas
          .on('postgres_changes', 
            { event: '*', schema: 'public', table: 'rifas' },
            (payload) => {
              console.log('Mudança em rifas:', payload);
              // Atualizar apenas a rifa alterada em vez de recarregar tudo
              if (payload.eventType === 'INSERT') {
                carregarRifasDoSupabase(); // Recarrega tudo para pegar a nova rifa com bolas
              } else if (payload.eventType === 'UPDATE') {
                carregarRifasDoSupabase();
              } else if (payload.eventType === 'DELETE') {
                carregarRifasDoSupabase();
              }
            }
          )
          // Escutar mudanças na tabela bolas (isso é o mais importante para tempo real)
          .on('postgres_changes',
            { event: '*', schema: 'public', table: 'bolas' },
            (payload) => {
              console.log('Mudança em bolas:', payload);
              // Atualização em tempo real das bolas sem recarregar tudo
              const { new: novaBola, old: bolaAntiga, eventType } = payload;
              const rifaId = novaBola?.rifa_id || bolaAntiga?.rifa_id;
              
              if (rifaId) {
                // Encontrar a rifa localmente e atualizar apenas a bola alterada
                const rifaIndex = RIFAS.findIndex(r => r.id === rifaId);
                if (rifaIndex !== -1) {
                  const rifa = RIFAS[rifaIndex];
                  const bolaIndex = rifa.bolas.findIndex(b => b.numero === (novaBola?.numero || bolaAntiga?.numero));
                  
                  if (eventType === 'UPDATE' && novaBola) {
                    if (bolaIndex !== -1) {
                      // Atualizar bola existente
                      rifa.bolas[bolaIndex] = {
                        numero: novaBola.numero,
                        status: novaBola.status,
                        clienteNome: novaBola.cliente_nome,
                        clienteTel: novaBola.cliente_tel
                      };
                    }
                  } else if (eventType === 'INSERT' && novaBola) {
                    // Adicionar nova bola (quando aumenta quantidade)
                    if (bolaIndex === -1) {
                      rifa.bolas.push({
                        numero: novaBola.numero,
                        status: novaBola.status,
                        clienteNome: novaBola.cliente_nome,
                        clienteTel: novaBola.cliente_tel
                      });
                      // Ordenar bolas
                      rifa.bolas.sort((a, b) => parseInt(a.numero) - parseInt(b.numero));
                    }
                  } else if (eventType === 'DELETE' && bolaAntiga) {
                    // Remover bola (quando diminui quantidade)
                    if (bolaIndex !== -1) {
                      rifa.bolas.splice(bolaIndex, 1);
                    }
                  }
                  
                  // Salvar e re-renderizar
                  salvarDadosLocal();
                } else {
                  // Se a rifa não foi encontrada localmente, recarregar tudo
                  carregarRifasDoSupabase();
                }
              }
            }
          )
          .subscribe();
      }

      function encontrarProximoIdDisponivel() {
        if (RIFAS.length === 0) return 1;
        const ids = RIFAS.map(r => r.id).sort((a,b)=>a-b);
        let esperado = 1;
        for (let id of ids) {
          if (id > esperado) return esperado;
          esperado = id + 1;
        }
        return esperado;
      }

      function formatarId(id) { return id.toString().padStart(2, '0'); }
      function formatarDataBR(dataISO) {
        if (!dataISO) return 'não definida';
        const [ano, mes, dia] = dataISO.split('-');
        return `${dia}/${mes}/${ano}`;
      }
      function formatarValor(valor) {
        if (!valor) return 'Valor não definido';
        return `R$ ${parseFloat(valor).toFixed(2)}`;
      }
      function escapeHTML(str) {
        if (!str) return '';
        return String(str).replace(/[&<>"]/g, function(m) {
          if (m === '&') return '&amp;';
          if (m === '<') return '&lt;';
          if (m === '>') return '&gt;';
          if (m === '"') return '&quot;';
          return m;
        });
      }
      function gerarNumeros(qtd) {
        const nums = [];
        for (let i = 0; i < qtd; i++) nums.push(i.toString().padStart(2, '0'));
        return nums;
      }

      async function editarRifa(rifa) {
        // Editar dados básicos
        const novoNome = await promptModerno('Editar nome do produto', 'Digite o novo nome', false);
        if (novoNome !== null && novoNome !== '') rifa.nomeProduto = novoNome;
        
        const novoSobre = await promptModerno('Editar descrição do produto', 'Digite a nova descrição', false);
        if (novoSobre !== null && novoSobre !== '') rifa.sobreProduto = novoSobre;
        
        const novoValor = await promptModerno('Editar valor do ponto (R$)', 'Ex: 10.00', false);
        if (novoValor !== null && novoValor !== '') rifa.valorPonto = novoValor;
        
        const novaChavePix = await promptModerno('Editar chave PIX', 'Digite a chave PIX', false);
        if (novaChavePix !== null && novaChavePix !== '') rifa.chavePix = novaChavePix;
        
        const novoTelefone = await promptModerno('Editar telefone do criador', 'Ex: 11999999999', false);
        if (novoTelefone !== null && novoTelefone !== '') rifa.telefoneCriador = novoTelefone;
        
        const novaData = await promptModerno('Editar data do sorteio (AAAA-MM-DD)', 'Ex: 2025-12-31', false);
        if (novaData !== null && novaData !== '') rifa.dataSorteio = novaData;
        
        // Editar imagem
        const trocarImagem = await promptModerno('Trocar imagem? (s/n)', 's ou n', false);
        let novaImagem = rifa.imagemData;
        if (trocarImagem && trocarImagem.toLowerCase() === 's') {
          const inputFile = document.createElement('input');
          inputFile.type = 'file';
          inputFile.accept = 'image/*';
          const novaImg = await new Promise((resolve) => {
            inputFile.onchange = (e) => {
              const file = e.target.files[0];
              if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => resolve(ev.target.result);
                reader.readAsDataURL(file);
              } else resolve(null);
            };
            inputFile.click();
          });
          if (novaImg) novaImagem = novaImg;
        }
        
        // Editar quantidade de bolas
        const opcoes = [10,20,30,40,50,100];
        const escolha = await promptModerno('Nova quantidade de bolas (10,20,30,40,50,100)', 'Ex: 50', false);
        let novaQtd = parseInt(escolha);
        if (!isNaN(novaQtd) && opcoes.includes(novaQtd)) {
          const qtdAtual = rifa.bolas.length;
          if (novaQtd !== qtdAtual) {
            if (novaQtd < qtdAtual) {
              // Verificar se as bolas a serem removidas estão todas disponíveis
              const bolasParaManter = rifa.bolas.slice(0, novaQtd);
              const bolasRemovidas = rifa.bolas.slice(novaQtd);
              const temOcupadas = bolasRemovidas.some(b => b.status !== 'disponivel');
              if (temOcupadas) {
                alertaModerno('Aviso', '⚠️', 'Não é possível reduzir a quantidade porque algumas bolas já foram compradas ou são vencedoras.');
              } else {
                // Remover bolas do Supabase
                for (const bola of bolasRemovidas) {
                  await supabaseClient.from('bolas').delete().eq('rifa_id', rifa.id).eq('numero', bola.numero);
                }
                rifa.bolas = bolasParaManter;
              }
            } else if (novaQtd > qtdAtual) {
              // Adicionar novas bolas
              const novas = [];
              for (let i = qtdAtual; i < novaQtd; i++) {
                const num = i.toString().padStart(2,'0');
                novas.push({ numero: num, status: 'disponivel', clienteNome: null, clienteTel: null });
              }
              const bolasParaInserir = novas.map(b => ({ rifa_id: rifa.id, numero: b.numero, status: b.status, cliente_nome: b.clienteNome, cliente_tel: b.clienteTel }));
              const { error } = await supabaseClient.from('bolas').insert(bolasParaInserir);
              if (!error) rifa.bolas.push(...novas);
              else alertaModerno('Erro', '❌', 'Erro ao adicionar bolas.');
            }
          }
        }
        
        // Atualizar rifa no banco
        try {
          const { error } = await supabaseClient
            .from('rifas')
            .update({
              nome_produto: rifa.nomeProduto,
              sobre_produto: rifa.sobreProduto,
              imagem_data: novaImagem,
              valor_ponto: rifa.valorPonto,
              chave_pix: rifa.chavePix,
              telefone_criador: rifa.telefoneCriador,
              data_sorteio: rifa.dataSorteio
            })
            .eq('id', rifa.id);
          if (error) throw error;
          rifa.imagemData = novaImagem;
          salvarDadosLocal();
          alertaModerno('Sucesso', '✅', 'Rifa atualizada com sucesso!');
        } catch (error) {
          alertaModerno('Erro', '❌', 'Erro ao atualizar rifa no servidor.');
        }
      }

      async function comprarBola(rifaId, indexBola) {
        const rifa = RIFAS.find(r => r.id === rifaId);

        const bola = rifa.bolas[indexBola];

        try {
          await atualizarBolaNoSupabase(rifaId, bola.numero, {
            status: 'comprada',
            clienteNome: nome,
            clienteTel: telefone
          });
          bola.status = 'comprada';
          bola.clienteNome = nome;
          bola.clienteTel = telefone;
          salvarDadosLocal();
          alertaModerno('Bola reservada', '✅', `Bola ${bola.numero} reservada com sucesso!`);

      <div class="alerta-moderno" style="max-width: 500px;">
        <div class="alerta-icon">💡</div>
        <h3>📢 Atenção!</h3>
        <p style="text-align: left;">
          Para criar a sua Rifa, copie o código Pix abaixo, clique em "OK" Prossiga Com a criação da Rifa inserindo seu e-mail e criando uma senha. Lembre-se de pagar uma taxa de <strong>R$ 10,00</strong> ao ADM:<br><br>
          <strong style="background: #1d4c2c; padding: 10px; border-radius: 10px; display: block; text-align: center; font-family: monospace; font-size: 14px; word-break: break-all;">
            ${chavePix}
          </strong><br>
          <button id="copiarPixBtn" style="background: #ffaa33; border: none; padding: 8px 20px; border-radius: 30px; font-weight: bold; cursor: pointer; margin-top: 5px; width: 100%;">📋 Copiar PIX</button><br><br>
          Após criar a Rifa e pagar o PIX, 
          Envie o comprovante por e-mail clicando no ícone de <strong>📢</strong> na parte superior direita da página.<br><br>
          ⚠️ Caso não seja identificado pagamento, a sua Rifa será banida.<br><br>
          <strong>Boas Vendas!</strong>
        </p>
      </div>
    `;
    document.body.appendChild(overlay);
    
    // Função para copiar PIX
    const copiarBtn = overlay.querySelector('#copiarPixBtn');
    copiarBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      navigator.clipboard.writeText(chavePix).then(() => {
        // Fechar o alerta principal
        document.body.removeChild(overlay);
        
        // Mostrar modal de sucesso
        const sucessoOverlay = document.createElement('div');
        sucessoOverlay.className = 'modal-overlay';
        sucessoOverlay.innerHTML = `
          <div class="alerta-moderno" style="max-width: 350px;">
            <div class="alerta-icon">✅</div>
            <h3>Sucesso!</h3>
            <p>Chave PIX copiada com sucesso!</p>
            <button id="btnContinuar" style="background: linear-gradient(45deg, #ff8c00, #ffaa33); border: none; padding: 12px 30px; border-radius: 50px; font-weight: bold; font-size: 16px; margin-top: 15px; cursor: pointer;">Continuar</button>
          </div>
        `;
        document.body.appendChild(sucessoOverlay);
        
        // Fechar modal de sucesso e abrir criação da rifa
        sucessoOverlay.querySelector('#btnContinuar').addEventListener('click', (e) => {
          e.stopPropagation();
          document.body.removeChild(sucessoOverlay);
          abrirCriacaoRifaInterna();
          resolve();
        });
      }).catch(() => {
        // Modal de erro
        const erroOverlay = document.createElement('div');
        erroOverlay.className = 'modal-overlay';
        erroOverlay.innerHTML = `
          <div class="alerta-moderno" style="max-width: 350px;">
            <div class="alerta-icon">❌</div>
            <h3>Erro!</h3>
            <p>Erro ao copiar chave PIX. Tente novamente.</p>
            <button id="btnTentarNovamente" style="background: linear-gradient(45deg, #ff8c00, #ffaa33); border: none; padding: 12px 30px; border-radius: 50px; font-weight: bold; font-size: 16px; margin-top: 15px; cursor: pointer;">Tentar Novamente</button>
          </div>
        `;
        document.body.appendChild(erroOverlay);
        
        erroOverlay.querySelector('#btnTentarNovamente').addEventListener('click', (e) => {
          e.stopPropagation();
          document.body.removeChild(erroOverlay);
        });
      });
    });
  });
}

      async function abrirCriacaoRifaInterna() {
        const email = await promptModerno('🔐 Autenticação (e-mail)', 'seu@email.com');
        if (!email || !email.includes('@')) {
          alertaModerno('E-mail inválido', '❌', 'Por favor, digite um e-mail válido.');
          return;
        }
        
        const senhaPessoal = await promptModerno('🔐 Crie uma senha pessoal', 'senha', true);
        if (!senhaPessoal) {
          alertaModerno('Senha necessária', '❌', 'Você precisa criar uma senha para acessar sua rifa.');
          return;
        }

        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        overlay.id = 'modalCriarRifa';
        const modal = document.createElement('div');
        modal.className = 'modal-card';
        
        const hoje = new Date();
        const ano = hoje.getFullYear();
        const mes = String(hoje.getMonth() + 1).padStart(2, '0');
        const dia = String(hoje.getDate()).padStart(2, '0');
        const dataAtual = `${ano}-${mes}-${dia}`;

        modal.innerHTML = `
          <h2>✚ Criar nova rifa</h2>
          <label>📸 Imagem do produto</label>
          <div class="file-upload" id="fileUploadTrigger">Clique para selecionar imagem ou GIF</div>
          <input type="file" id="fileInput" accept="image/*" style="display:none;">

          <label>🏷️ Nome do produto</label>
          <input type="text" id="nomeProduto" placeholder="ex: Smartphone X">

          <label>📄 Sobre o produto</label>
          <textarea id="sobreProduto" rows="2" placeholder="Descreva o produto..."></textarea>

          <label>🔢 Quantidade de bolas (00 até ...)</label>
          <select id="qtdBolas">
            <option value="10">10 bolas (00-09)</option>
            <option value="20">20 bolas (00-19)</option>
            <option value="30">30 bolas (00-29)</option>
            <option value="40">40 bolas (00-39)</option>
            <option value="50" selected>50 bolas (00-49)</option>
            <option value="100">100 bolas (00-99)</option>
          </select>

          <label>💰 Valor do ponto (R$)</label>
          <input type="number" id="valorPonto" step="0.01" min="0" placeholder="ex: 5.00">

          <label>🔐 Senha para finalizar rifa</label>
          <input type="password" id="senhaRifa" placeholder="crie uma senha">

          <label>📱 Seu número com DDD (WhatsApp)</label>
          <input type="text" id="telefoneCriador" placeholder="ex: 11999999999">

          <label>💰 Chave PIX (para pagamento)</label>
          <input type="text" id="chavePix" placeholder="ex: 11999999999 ou email@exemplo.com">

          <label>📅 Data do sorteio</label>
          <input type="date" id="dataSorteio" value="${dataAtual}">

          <div style="display:flex; gap:15px; margin-top:25px;">
            <button id="gerarRifaBtn">✅ Gerar Rifa</button>
            <button class="btn-sec" id="cancelarBtn">Cancelar</button>
          </div>
        `;

        overlay.appendChild(modal);
        document.body.appendChild(overlay);

        const fileTrigger = modal.querySelector('#fileUploadTrigger');
        const fileInput = modal.querySelector('#fileInput');
        let imagemBase64 = null;

        fileTrigger.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
          const file = e.target.files[0];
          if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
              imagemBase64 = ev.target.result;
              fileTrigger.textContent = '✅ Imagem carregada!';
              fileTrigger.style.background = '#3d9b4d';
            };
            reader.readAsDataURL(file);
          }
        });

        modal.querySelector('#gerarRifaBtn').addEventListener('click', async () => {
          const nome = document.getElementById('nomeProduto').value.trim() || 'Sem nome';
          const sobre = document.getElementById('sobreProduto').value.trim() || '—';
          const qtd = parseInt(document.getElementById('qtdBolas').value, 10);
          const valorPonto = document.getElementById('valorPonto').value;
          const senha = document.getElementById('senhaRifa').value;
          if (!senha) { 
            alertaModerno('Aviso', '🔐', 'Defina uma senha para proteger a rifa.'); 
            return; 
          }
          const telefoneCriador = document.getElementById('telefoneCriador').value.trim();
          const chavePix = document.getElementById('chavePix').value.trim();
          const dataSorteio = document.getElementById('dataSorteio').value || dataAtual;

          const bolas = gerarNumeros(qtd).map(num => ({
            numero: num,
            status: 'disponivel',
            clienteNome: null,
            clienteTel: null
          }));

          const novaRifa = {
            id: encontrarProximoIdDisponivel(),
            nomeProduto: nome,
            sobreProduto: sobre,
            imagemData: imagemBase64,
            bolas: bolas,
            valorPonto: valorPonto,
            senha: senha,
            senhaPessoal: senhaPessoal,
            telefoneCriador: telefoneCriador,
            chavePix: chavePix,
            dataSorteio: dataSorteio,
            criadorEmail: email
          };

          try {
            const novoId = await salvarRifaNoSupabase(novaRifa);
            if (novoId) {
              novaRifa.id = novoId;
              RIFAS.push(novaRifa);
              salvarDadosLocal();
              document.body.removeChild(overlay);
              alertaModerno('Rifa criada!', '🎉', 'Sua rifa foi criada com sucesso!');
              await carregarRifasDoSupabase();
            }
          } catch (error) {
            alertaModerno('Erro', '❌', 'Erro ao criar rifa no servidor.');
          }
        });

        modal.querySelector('#cancelarBtn').addEventListener('click', () => {
          document.body.removeChild(overlay);
        });
      }

      // ---------- LINK MINHAS RIFAS ----------
      document.getElementById('linkMinhasRifas').addEventListener('click', async () => {
        const idRifa = await promptModerno('Digite o ID da rifa (está no card)', 'ex: 01');
        if (!idRifa) return;
        const idNumerico = parseInt(idRifa, 10);
        const rifa = RIFAS.find(r => r.id === idNumerico);
        if (!rifa) {
          alertaModerno('Erro', '❌', 'Rifa não encontrada!');
          return;
        }

        const senhaPessoal = await promptModerno('Digite sua senha pessoal', 'senha', true);
        if (senhaPessoal !== rifa.senhaPessoal) {
          alertaModerno('Erro', '❌', 'Senha pessoal incorreta!');
          return;
        }

        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        const modal = document.createElement('div');
        modal.className = 'modal-card';
        modal.style.maxWidth = '800px';
        modal.innerHTML = `<h2>📋 Dados da Rifa</h2><div id="conteudoMinhasRifas"></div><button class="btn-sec" id="fecharMinhasRifas">Fechar</button>`;
        overlay.appendChild(modal);
        document.body.appendChild(overlay);

        const conteudo = modal.querySelector('#conteudoMinhasRifas');
        
        const divRifa = document.createElement('div');
        divRifa.style.background = '#1b4d2b';
        divRifa.style.borderRadius = '20px';
        divRifa.style.padding = '15px';
        divRifa.style.marginBottom = '20px';
        divRifa.innerHTML = `<h3 style="color:orange;">${escapeHTML(rifa.nomeProduto)} (ID: ${formatarId(rifa.id)}) 
          <button class="btn-editar" onclick="editarRifa(${JSON.stringify(rifa).replace(/"/g, '&quot;')})">✏️ Editar</button>
        </h3>`;

        const compradas = rifa.bolas.filter(b => b.status !== 'disponivel');
        if (compradas.length === 0) {
          divRifa.innerHTML += '<p>Nenhuma bola comprada ainda.</p>';
        } else {
          const wrapper = document.createElement('div');
          wrapper.className = 'tabela-wrapper';
          const tabela = document.createElement('table');
          tabela.className = 'tabela-clientes';
          tabela.innerHTML = '青少年<th>Nº</th><th>Cliente</th><th>Telefone</th><th>Status</th><th>Ação</th>39';
          compradas.forEach(b => {
            const row = tabela.insertRow();
            row.insertCell().textContent = b.numero;
            row.insertCell().textContent = b.clienteNome || '-';
            const cellTel = row.insertCell();
            if (b.status === 'ganhadora' && b.clienteTel) {
              const telSpan = document.createElement('span');
              telSpan.className = 'telefone-vencedor';
              telSpan.textContent = b.clienteTel;
              telSpan.onclick = () => abrirWhatsappVencedor(b.clienteTel);
              cellTel.appendChild(telSpan);
            } else {
              cellTel.textContent = b.clienteTel || '-';
            }
            row.insertCell().textContent = b.status === 'ganhadora' ? '🏆 Vencedor' : 'Comprada';
            const cellAcao = row.insertCell();
            if (b.status === 'comprada') {
              const btnExcluir = document.createElement('button');
              btnExcluir.className = 'btn-excluir-cliente';
              btnExcluir.textContent = '❌ Liberar';
              btnExcluir.onclick = () => {
                if (confirm(`Liberar bola ${b.numero}?`)) {
                  excluirCliente(rifa.id, b.numero);
                  document.body.removeChild(overlay);
                  renderizarRifas();
                }
              };
              cellAcao.appendChild(btnExcluir);
            } else {
              cellAcao.textContent = '-';
            }
          });
          wrapper.appendChild(tabela);
          divRifa.appendChild(wrapper);
        }

        const divVenc = document.createElement('div');
        divVenc.className = 'vencedor-linha';
        divVenc.innerHTML = `
          <label>Definir bola vencedora:</label>
          <div>
            <input type="text" id="numVenc_${rifa.id}" placeholder="00" size="3" maxlength="2">
            <button id="btnVenc_${rifa.id}">Salvar vencedor</button>
          </div>
        `;
        divRifa.appendChild(divVenc);
        conteudo.appendChild(divRifa);

        document.getElementById('btnVenc_'+rifa.id).addEventListener('click', async () => {
          const input = document.getElementById('numVenc_'+rifa.id);
          const num = input.value.trim().padStart(2,'0');
          const bola = rifa.bolas.find(b => b.numero === num);
          if (!bola) { 
            alertaModerno('Erro', '❌', 'Número não existe'); 
            return; 
          }
          if (bola.status === 'disponivel') {
            alertaModerno('Aviso', '⚠️', 'Esta bola ainda não foi comprada!');
            return;
          }
          try {
            await atualizarBolaNoSupabase(rifa.id, num, {
              status: 'ganhadora',
              clienteNome: bola.clienteNome,
              clienteTel: bola.clienteTel
            });
            rifa.bolas.forEach(b => { if (b.status === 'ganhadora') b.status = 'comprada'; });
            bola.status = 'ganhadora';
            salvarDadosLocal();
            document.body.removeChild(overlay);
            renderizarRifas();
            alertaModerno('Vencedor definido', '🏆', `Bola ${num} agora é a vencedora!`);
          } catch (error) {
            alertaModerno('Erro', '❌', 'Erro ao definir vencedor.');
          }
        });

        modal.querySelector('#fecharMinhasRifas').addEventListener('click', () => document.body.removeChild(overlay));
      });

      // Expor funções globais
      window.editarRifa = editarRifa;
      window.acessarAdmin = acessarAdmin;

      // ---------- TERMO DE USO ----------
      function mostrarTermoUso() {
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        overlay.innerHTML = `
          <div class="modal-card" style="max-width: 700px;">
            <h2>📋 Termo de Uso da Plataforma</h2>
            <p style="color: #ffd966; font-size: 18px; margin-bottom: 20px;">Esta Aplicação é livre e fica sob a responsabilidade do usuário o uso desta plataforma.</p>
            <div style="background: #0d391f; padding: 20px; border-radius: 30px; margin: 20px 0;">
              <p style="color: white; margin: 10px 0;"><span style="color: #ffaa33;">⚠️</span> <strong style="color: #ffd966;">Ao criar uma Rifa:</strong> opte por cadastrar uma chave Pix aleatória gerada no seu banco ou e-mail. Não é aconselhável cadastrar chave Pix com número de telefone ou CPF, pois a chave é exibida na Rifa para os usuários compradores copiarem e efetuarem os pagamentos.</p>
              <p style="color: white; margin: 15px 0;"><span style="color: #4ec0e9;">🎲</span> <strong style="color: #ffd966;">Os Sorteios</strong> deverão ser baseados nos sorteios da Loteria Estadual do Ceará (Lotece), para evitar possíveis fraudes em sorteios.</p>
              <p style="color: white; margin: 15px 0;"><span style="color: #4ec0e9;">📱</span> <strong style="color: #ffd966;">Cadastre corretamente</strong> seus dados no sistema: número de contato e e-mail, pois os mesmos serão usados para contato em eventual pagamento ou premiação. Após o final do sorteio, seus dados serão removidos do sistema.</p>
            </div>
            <p style="color: #00ff9c; font-size: 20px; text-align: center; margin: 20px 0;">Divirta-se! 🎉</p>
            <div style="display: flex; justify-content: center;">
              <button id="btnAceitarTermo" class="btn-termo">Entendi e Aceito</button>
            </div>
          </div>
        `;
        document.body.appendChild(overlay);
        overlay.querySelector('#btnAceitarTermo').addEventListener('click', () => {
          document.body.removeChild(overlay);
          localStorage.setItem('termo_aceito', 'true');
        });
      }

      // ---------- INICIALIZAÇÃO ----------
      const termoAceito = localStorage.getItem('termo_aceito');
      if (!termoAceito) setTimeout(mostrarTermoUso, 500);

      // Redirecionar clique do link "Criar Rifa" para mostrar alerta primeiro
      document.getElementById('criarRifaLink').addEventListener('click', () => {
        abrirCriacaoRifaComAlerta();
      });

      // PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('service-worker.js').catch(e => console.log('SW falhou:', e));
        });
      }
      let deferredPrompt;
      const installBtn = document.getElementById('installButton');
      window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; installBtn.style.display = 'block'; });
      installBtn.addEventListener('click', async () => { if (deferredPrompt) { deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt = null; installBtn.style.display = 'none'; } });

      // Iniciar
      carregarRifasDoSupabase();
    })();
  </script>
</body>
</html>
